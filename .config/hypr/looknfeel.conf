# Change the default Omarchy look'n'feel

# https://wiki.hyprland.org/Configuring/Variables/#general
general {
    # No gaps between windows or borders
     gaps_in = 8
     gaps_out = 10
     border_size = 2
     layout = dwindle
}

# https://wiki.hyprland.org/Configuring/Variables/#decoration
decoration {
    # Use round window corners
     rounding = 12
}

master {
    # New windows become the master (true) or go to the stack (false)
    new_status = false

    # Where new windows go in the stack: after, before
    new_on_top = false

    # Size of the master area as a fraction of the screen (0.0–1.0)
    mfact = 0.75

    # Master on the left/right/top/bottom/center
    orientation = left

    # Keep a single window centred instead of fullscreen-width
    # slave_count_for_center_master = 2
    # center_master_fallback = false

    # Don't apply gaps when there's only one window
    # smart_resizing = true
}

# https://wiki.hypr.land/Configuring/Variables/#layout
dwindle {
    force_split = 2
    default_split_ratio = 1.50
    # Avoid overly wide single-window layouts on wide screens
    # single_window_aspect_ratio = 1 1
}

general {
    resize_on_border = true
    extend_border_grab_area = 10
    hover_icon_on_border = true
}

# Cursor theme and size
env = XCURSOR_THEME,Bibata-Modern-Classic
env = HYPRCURSOR_THEME,Bibata-Modern-Classic
env = XCURSOR_SIZE,20
env = HYPRCURSOR_SIZE,20

animations {
    enabled = true

    # --------------------------------------------------------
    # Bezier Curves
    # --------------------------------------------------------
    bezier = pro, 0.05, 0.9, 0.1, 1.0
    bezier = snap, 0.05, 0.9, 0.1, 1.05

    # --------------------------------------------------------
    # Application Windows (Speed: 3 - Relaxed/Clear)
    # --------------------------------------------------------
    animation = windows, 1, 3, snap, popin 80%
    animation = windowsOut, 1, 3, snap, popin 80%
    animation = windowsMove, 1, 3, snap
    
    # --------------------------------------------------------
    # UI Layers: SwayNC, Rofi, Waybar (Speed: 2 - Snappy)
    # --------------------------------------------------------
    # This '2' is the key. It makes SwayNC faster than windows.
    # We use 'slide' generally, but can override direction in layer rules.
    animation = layers, 1, 2, pro, slide
    animation = fade, 1, 2, pro

    # fix for screenshot gray capture
    animation = layersOut, 0, 0,
    
    animation = border, 1, 3, pro

    # --------------------------------------------------------
    # Workspaces (vertical Slide)
    # --------------------------------------------------------
    animation = workspaces, 1, 0.3, pro, slide

    # Special Workspace (Scratchpad)
    animation = specialWorkspace, 1, 0.3, pro, slidevert
}

plugin:dynamic-cursors {
    enabled = true
    mode = tilt

    tilt {

        # controls how powerful the tilt is, the lower, the more power
        # this value controls at which speed (px/s) the full tilt is reached
        limit = 1000

        # relationship between speed and tilt, supports these values:
        # linear             - a linear function is used
        # quadratic          - a quadratic function is used (most realistic to actual air drag)
        # negative_quadratic - negative version of the quadratic one, feels more aggressive
        # see `activation` in `src/mode/utils.cpp` for how exactly the calculation is done
        function = negative_quadratic

        # time window (ms) over which the speed is calculated
        # higher values will make slow motions smoother but more delayed
        window = 100

        # full tilt for each side (°)
        full_tilt = 60
    }

    rotate {

        # length in px of the simulated stick used to rotate the cursor
        # most realistic if this is your actual cursor size
        length = 18

        # clockwise offset applied to the angle in degrees
        # this will apply to ALL shapes
        offset = 0.0
    }

    shake {

        # enables shake to find
        enabled = true

        # use nearest-neighbour (pixelated) scaling when shaking
        # may look weird when effects are enabled
        nearest = true

        # controls how soon a shake is detected
        # lower values mean sooner
        threshold = 10.0

        # magnification level immediately after shake start
        base = 3.0
        # magnification increase per second when continuing to shake
        speed = 3.0
        # how much the speed is influenced by the current shake intensity
        influence = 0.0

        # maximal magnification the cursor can reach
        # values below 1 disable the limit (e.g. 0)
        limit = 3.0

        # time in milliseconds the cursor will stay magnified after a shake has ended
        timeout = 10000

        # show cursor behaviour `tilt`, `rotate`, etc. while shaking
        effects = false

        # enable ipc events for shake
        # see the `ipc` section below
        ipc = false
    }
    hyprcursor {

        # use nearest-neighbour (pixelated) scaling when magnifying beyond texture size
        # this will also have effect without hyprcursor support being enabled
        # 0 / false - never use pixelated scaling
        # 1 / true  - use pixelated when no highres image
        # 2         - always use pixelated scaling
        nearest = true

        # enable dedicated hyprcursor support
        enabled = true

        # resolution in pixels to load the magnified shapes at
        # be warned that loading a very high-resolution image will take a long time and might impact memory consumption
        # -1 means we use [normal cursor size] * [shake:base option]
        resolution = -1

        # shape to use when clientside cursors are being magnified
        # see the shape-name property of shape rules for possible names
        # specifying clientside will use the actual shape, but will be pixelated
        fallback = clientside
    }
}
